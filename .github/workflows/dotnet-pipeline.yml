name: iWllet Pipeline

on:
    workflow_dispatch: 
    push:
        branches: 
            - master    
            - main 

        paths-ignore: 
           - '**/README.md'
    pull_request:
      branches: [ "master" , "main" ]
concurrency: 
  group: iwallet-app
  cancel-in-progress: false
    

jobs:
    build-app:
        timeout-minutes: 5
        runs-on: ubuntu-latest

        container:
          image: mcr.microsoft.com/dotnet/sdk:10.0
          options: --user root
        
        steps:
            - name: pull repo code inside runner
              uses: actions/checkout@v6

            - name: cache dependecies
              uses: actions/cache@v3
              with:
                path: /root/.nuget/packages
                key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

            - name: restore dependecies
              run: dotnet restore

            - name: build app
              run: dotnet build --no-restore --configuration Release
        
            - name: test
              run: dotnet test --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

            - name: upload test results
              if: always()
              uses: actions/upload-artifact@v5
              with:
                name: test-results
                path: '**/*.trx'
                

    containerization:
      needs: build-app
      runs-on: ubuntu-latest
      timeout-minutes: 8
      # permissions:
      #  contents: read
      #  packages: write
      
      outputs:
        image: ${{ steps.set-image.outputs.image }}

      steps:
        - name: pull repo code to runner
          uses: actions/checkout@v5

        - name: set repo name to lower case   # to easy push to ghcr
          run: |
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            echo "REPO=$REPO" >> $GITHUB_ENV

        - name: login to ghcr
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.CR_PAT }}


        - name: build and push image to ghcr
          continue-on-error: true
          uses: docker/build-push-action@v7.1.0
          with:
            context: .
            file: ./iWallet.API/Dockerfile
            push: true
            tags: |
               ghcr.io/${{ env.REPO }}:latest
               ghcr.io/${{ env.REPO }}:${{ github.sha }}

        - name: set image output
          id: set-image
          run: |
            IMAGE="ghcr.io/${{ env.REPO }}:${{ github.sha }}"
            echo "IMAGE=$IMAGE"
            echo "image=$IMAGE" >> $GITHUB_OUTPUT

          
    deploy-gitops:
      needs: containerization
      runs-on: ubuntu-latest
      timeout-minutes: 5
      continue-on-error: true
      steps:
        - name: checkout repo code 
          run: |
            git clone https://${{ secrets.GITOPS_PAT }}@github.com/Abobkeryousif/iwallet-gitops.git gitops
        - name: apply blue-green update
          env:
            IMAGE: ${{ needs.containerization.outputs.image }}
          run: |
            cd gitops/manifests

            git config user.name "github-actions"
            git config user.email "actions@github.com"

            CURRENT=$(grep 'version:' service.yaml | awk '{print $2}')
            echo "Current live: $CURRENT"

            if [ "$CURRENT" = "green" ]; then
              LIVE_FILE="green-deployment.yaml"
              BACKUP_FILE="blue-deployment.yaml"
              NEXT="green"
            else
              LIVE_FILE="blue-deployment.yaml"
              BACKUP_FILE="green-deployment.yaml"
              NEXT="blue"
            fi
            
            CURRENT_IMAGE=$(grep 'image:' $LIVE_FILE | awk '{print $2}')
            sed -i "s|image: .*|image: $CURRENT_IMAGE|g" $BACKUP_FILE

            sed -i "s|image: .*|image: $IMAGE|g" $LIVE_FILE

            sed -i "s|version: .*|version: $NEXT|g" service.yaml

            git add .
            git commit -m "Blue-Green deploy $IMAGE (backup $CURRENT_IMAGE)" || echo "no changes"
            git push
    
